<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Robby England</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background-color: #2c3e50;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    h1 {
      font-family: Helvetica Neue, Helvetica, Arial, sans-serif;
      font-weight: 300;
      font-size: clamp(1.5rem, 6vw, 5rem);
      color: #e8e0d5;
      letter-spacing: 0.08em;
      text-align: center;
      padding: 0 1rem;
    }
  </style>
</head>
<body>
  <h1>Robby England</h1>
</body>
</html>
