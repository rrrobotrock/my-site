<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>robbyengland.com</title>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-8N1ET1NL49"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-8N1ET1NL49');
  </script>

  <!-- Fredoka as the solid filled-in fallback -->
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background-color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .balloon-wrap {
      position: relative;
      display: inline-block;
      text-align: center;
      padding: 0 1rem;
      cursor: pointer;
    }

    /* Base layer: deep metallic red */
    .balloon-base {
      font-family: "Comic Sans MS", "Comic Sans", "Chalkboard SE", "Chalkboard", "Fredoka", cursive;
      font-weight: bold;
      font-size: clamp(2rem, 6vw, 5.5rem);
      letter-spacing: 0.02em;
      background: linear-gradient(
        180deg,
        #ff6666 0%,
        #ee0000 25%,
        #cc0000 50%,
        #aa0000 70%,
        #880000 100%
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter:
        drop-shadow(0.04em 0.08em 0px #6b0000)
        drop-shadow(0px 0.1em 0.15em rgba(0, 0, 0, 0.35))
        drop-shadow(0px 0.02em 0px rgba(255,255,255,0.4));
      position: relative;
    }

    /* Static glint/shine overlay layer */
    .balloon-glint {
      font-family: "Comic Sans MS", "Comic Sans", "Chalkboard SE", "Chalkboard", "Fredoka", cursive;
      font-weight: bold;
      font-size: clamp(2rem, 6vw, 5.5rem);
      letter-spacing: 0.02em;
      position: absolute;
      top: 0;
      left: 1rem;
      right: 1rem;
      background: linear-gradient(
        135deg,
        rgba(255, 255, 255, 0.95) 0%,
        rgba(255, 200, 200, 0.6) 18%,
        rgba(255, 255, 255, 0) 35%,
        rgba(255, 255, 255, 0) 65%,
        rgba(255, 180, 180, 0.25) 85%,
        rgba(255, 255, 255, 0.5) 100%
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      pointer-events: none;
    }

    /* Animated sun sweep glimmer */
    .balloon-sweep {
      font-family: "Comic Sans MS", "Comic Sans", "Chalkboard SE", "Chalkboard", "Fredoka", cursive;
      font-weight: bold;
      font-size: clamp(2rem, 6vw, 5.5rem);
      letter-spacing: 0.02em;
      position: absolute;
      top: 0;
      left: 1rem;
      right: 1rem;
      background: linear-gradient(
        105deg,
        rgba(255,255,255,0) 30%,
        rgba(255,255,255,0.85) 46%,
        rgba(255,245,245,1) 50%,
        rgba(255,255,255,0.85) 54%,
        rgba(255,255,255,0) 70%
      );
      background-size: 300% 100%;
      background-position: -100% 0;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      pointer-events: none;
      animation: sunSweep 3.5s ease-in-out infinite;
    }

    @keyframes sunSweep {
      0%   { background-position: -100% 0; opacity: 0; }
      8%   { opacity: 1; }
      62%  { background-position: 200% 0; opacity: 1; }
      75%  { opacity: 0; }
      100% { background-position: 200% 0; opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="balloon-wrap" id="text-wrap">
    <div class="balloon-base">robbyengland.com</div>
    <div class="balloon-glint">robbyengland.com</div>
    <div class="balloon-sweep">robbyengland.com</div>
  </div>

  <script>
    // --- Click on text ---
    document.getElementById('text-wrap').addEventListener('click', function(e) {
      e.stopPropagation();
      gtag('event', 'click_text', {
        event_category: 'engagement',
        event_label: 'clicked url text'
      });
    });

    // --- Click on whitespace (top vs bottom) ---
    document.body.addEventListener('click', function(e) {
      var midpoint = window.innerHeight / 2;
      if (e.clientY < midpoint) {
        gtag('event', 'click_top', {
          event_category: 'engagement',
          event_label: 'clicked top whitespace'
        });
      } else {
        gtag('event', 'click_bottom', {
          event_category: 'engagement',
          event_label: 'clicked bottom whitespace'
        });
      }
    });

    // --- Scroll attempt (desktop mouse wheel) ---
    var scrollFired = false;
    window.addEventListener('wheel', function() {
      if (!scrollFired) {
        scrollFired = true;
        gtag('event', 'scroll_attempt', {
          event_category: 'engagement',
          event_label: 'attempted scroll desktop'
        });
        // Reset after 2s so repeated attempts can be tracked
        setTimeout(function() { scrollFired = false; }, 2000);
      }
    }, { passive: true });

    // --- Scroll attempt (mobile touch) ---
    var touchStartY = null;
    var touchScrollFired = false;
    window.addEventListener('touchstart', function(e) {
      touchStartY = e.touches[0].clientY;
    }, { passive: true });

    window.addEventListener('touchmove', function(e) {
      if (!touchScrollFired && touchStartY !== null) {
        var deltaY = Math.abs(e.touches[0].clientY - touchStartY);
        if (deltaY > 10) {
          touchScrollFired = true;
          gtag('event', 'scroll_attempt', {
            event_category: 'engagement',
            event_label: 'attempted scroll mobile'
          });
          setTimeout(function() { touchScrollFired = false; }, 2000);
        }
      }
    }, { passive: true });
  </script>
</body>
</html>
